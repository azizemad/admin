<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLACHA | لوحة التحكم - إدارة الطلبات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Cairo', sans-serif;
      background: #0a0e17;
      color: #f5f5f7;
      padding: 20px;
    }
    
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .admin-header {
      background: linear-gradient(135deg, #d4af37, #2d6a4f);
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 30px;
      text-align: center;
    }
    
    .admin-header h1 {
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: #11161f;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      border: 1px solid rgba(212, 175, 55, 0.3);
    }
    
    .stat-card i {
      font-size: 36px;
      color: #d4af37;
      margin-bottom: 10px;
    }
    
    .stat-card .number {
      font-size: 32px;
      font-weight: 800;
      color: #d4af37;
    }
    
    .orders-list {
      background: #11161f;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(212, 175, 55, 0.3);
    }
    
    .orders-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
    }
    
    .filter-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      background: #1a212c;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      color: #a5b1c2;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .filter-btn.active {
      background: #d4af37;
      color: #0a0e17;
      font-weight: 600;
    }
    
    .order-card {
      background: #1a212c;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 15px;
      transition: all 0.3s;
    }
    
    .order-card:hover {
      transform: translateX(-5px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
    
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }
    
    .order-id {
      font-size: 18px;
      font-weight: 700;
      color: #d4af37;
    }
    
    .order-status {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-pending { background: #f39c12; color: #0a0e17; }
    .status-paid { background: #27ae60; color: white; }
    .status-shipped { background: #3498db; color: white; }
    .status-delivered { background: #2ecc71; color: white; }
    .status-rejected { background: #e74c3c; color: white; }
    
    .order-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }
    
    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    
    .detail-label {
      font-size: 12px;
      color: #a5b1c2;
    }
    
    .detail-value {
      font-size: 14px;
      font-weight: 500;
    }
    
    .products-list {
      background: #0f1420;
      border-radius: 12px;
      padding: 10px;
      margin: 10px 0;
    }
    
    .product-item {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 13px;
    }
    
    .order-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }
    
    .action-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .action-btn.approve {
      background: #27ae60;
      color: white;
    }
    
    .action-btn.reject {
      background: #e74c3c;
      color: white;
    }
    
    .action-btn.ship {
      background: #3498db;
      color: white;
    }
    
    .action-btn.deliver {
      background: #2ecc71;
      color: white;
    }
    
    .action-btn:hover {
      transform: scale(1.05);
    }
    
    .rejection-reason {
      margin-top: 10px;
      display: none;
    }
    
    .rejection-reason textarea {
      width: 100%;
      padding: 8px;
      background: #0a0e17;
      border: 1px solid #d4af37;
      border-radius: 8px;
      color: white;
      margin-top: 5px;
    }
    
    @media (max-width: 768px) {
      .order-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
<div class="admin-container">
  <div class="admin-header">
    <h1><i class="fas fa-crown"></i> PLACHA - لوحة تحكم الإدارة</h1>
    <p>إدارة الطلبات وتحديث الحالات</p>
  </div>
  
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <i class="fas fa-shopping-cart"></i>
      <div class="number" id="totalOrders">0</div>
      <div>إجمالي الطلبات</div>
    </div>
    <div class="stat-card">
      <i class="fas fa-clock"></i>
      <div class="number" id="pendingOrders">0</div>
      <div>قيد المراجعة</div>
    </div>
    <div class="stat-card">
      <i class="fas fa-check-circle"></i>
      <div class="number" id="paidOrders">0</div>
      <div>تم الدفع</div>
    </div>
    <div class="stat-card">
      <i class="fas fa-truck"></i>
      <div class="number" id="shippedOrders">0</div>
      <div>تم الشحن</div>
    </div>
    <div class="stat-card">
      <i class="fas fa-box"></i>
      <div class="number" id="deliveredOrders">0</div>
      <div>تم التوصيل</div>
    </div>
  </div>
  
  <div class="orders-list">
    <div class="orders-header">
      <h3><i class="fas fa-list"></i> قائمة الطلبات</h3>
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">الكل</button>
        <button class="filter-btn" data-filter="pending">⏳ قيد المراجعة</button>
        <button class="filter-btn" data-filter="paid">✅ تم الدفع</button>
        <button class="filter-btn" data-filter="shipped">🚚 تم الشحن</button>
        <button class="filter-btn" data-filter="delivered">📦 تم التوصيل</button>
        <button class="filter-btn" data-filter="rejected">❌ مرفوض</button>
      </div>
    </div>
    <div id="ordersList">
      <div style="text-align: center; padding: 40px;">جاري تحميل الطلبات...</div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAFG65jPp_XEpjECxDhE3gw6F-OUeUJhjw",
    authDomain: "football-az-5a50d.firebaseapp.com",
    databaseURL: "https://football-az-5a50d-default-rtdb.firebaseio.com",
    projectId: "football-az-5a50d",
    storageBucket: "football-az-5a50d.appspot.com",
    messagingSenderId: "740799005307",
    appId: "1:740799005307:web:75b5bdc70e80aeee5f18de"
  };
  
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  
  let currentFilter = 'all';
  let ordersData = {};
  
  function loadOrders() {
    db.ref('orders').on('value', (snapshot) => {
      ordersData = snapshot.val() || {};
      updateStats();
      renderOrders();
    });
  }
  
  function updateStats() {
    const orders = Object.values(ordersData);
    const total = orders.length;
    const pending = orders.filter(o => o.status === 'pending').length;
    const paid = orders.filter(o => o.status === 'paid').length;
    const shipped = orders.filter(o => o.status === 'shipped').length;
    const delivered = orders.filter(o => o.status === 'delivered').length;
    
    document.getElementById('totalOrders').innerText = total;
    document.getElementById('pendingOrders').innerText = pending;
    document.getElementById('paidOrders').innerText = paid;
    document.getElementById('shippedOrders').innerText = shipped;
    document.getElementById('deliveredOrders').innerText = delivered;
  }
  
  function getStatusText(status) {
    const statusMap = {
      'pending': '⏳ قيد المراجعة',
      'paid': '✅ تم الدفع',
      'shipped': '🚚 تم الشحن',
      'delivered': '📦 تم التوصيل',
      'rejected': '❌ مرفوض'
    };
    return statusMap[status] || status;
  }
  
  function getStatusClass(status) {
    const classMap = {
      'pending': 'status-pending',
      'paid': 'status-paid',
      'shipped': 'status-shipped',
      'delivered': 'status-delivered',
      'rejected': 'status-rejected'
    };
    return classMap[status] || 'status-pending';
  }
  
  async function updateOrderStatus(orderId, newStatus, rejectReason = '') {
    const updates = { status: newStatus };
    if (rejectReason) updates.rejectReason = rejectReason;
    await db.ref(`orders/${orderId}`).update(updates);
    
    let message = '';
    if (newStatus === 'paid') message = '✅ تم تأكيد دفع الطلب';
    else if (newStatus === 'shipped') message = '🚚 تم شحن الطلب';
    else if (newStatus === 'delivered') message = '📦 تم توصيل الطلب';
    else if (newStatus === 'rejected') message = '❌ تم رفض الطلب';
    
    Swal.fire({
      icon: 'success',
      title: 'تم التحديث',
      text: message,
      toast: true,
      timer: 2000,
      showConfirmButton: false
    });
  }
  
  function showRejectModal(orderId) {
    Swal.fire({
      title: 'رفض الطلب',
      html: `
        <textarea id="rejectReason" class="swal2-textarea" placeholder="سبب الرفض (اختياري)"></textarea>
      `,
      showCancelButton: true,
      confirmButtonText: 'تأكيد الرفض',
      cancelButtonText: 'إلغاء',
      preConfirm: () => {
        const reason = document.getElementById('rejectReason').value;
        updateOrderStatus(orderId, 'rejected', reason);
      }
    });
  }
  
  function renderOrders() {
    const container = document.getElementById('ordersList');
    let orders = Object.values(ordersData);
    
    if (currentFilter !== 'all') {
      orders = orders.filter(o => o.status === currentFilter);
    }
    
    orders.sort((a, b) => b.createdAt - a.createdAt);
    
    if (orders.length === 0) {
      container.innerHTML = '<div style="text-align: center; padding: 40px;">📭 لا توجد طلبات</div>';
      return;
    }
    
    container.innerHTML = orders.map(order => `
      <div class="order-card">
        <div class="order-header">
          <div class="order-id">🆔 ${order.orderId}</div>
          <div class="order-status ${getStatusClass(order.status)}">${getStatusText(order.status)}</div>
        </div>
        
        <div class="order-details">
          <div class="detail-item">
            <span class="detail-label"><i class="fas fa-user"></i> الاسم</span>
            <span class="detail-value">${order.fullName}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label"><i class="fas fa-phone"></i> الهاتف 1</span>
            <span class="detail-value">${order.phoneNumber}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label"><i class="fas fa-phone-alt"></i> الهاتف 2</span>
            <span class="detail-value">${order.phoneNumber2 || 'لا يوجد'}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label"><i class="fas fa-location-dot"></i> العنوان</span>
            <span class="detail-value">${order.address}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label"><i class="fas fa-credit-card"></i> طريقة الدفع</span>
            <span class="detail-value">${order.paymentMethod}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label"><i class="fas fa-exchange-alt"></i> رقم المحول منه</span>
            <span class="detail-value">${order.transferPhone}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label"><i class="fas fa-calendar"></i> التاريخ</span>
            <span class="detail-value">${new Date(order.createdAt).toLocaleString('ar-EG')}</span>
          </div>
        </div>
        
        <div class="products-list">
          <div style="font-weight: 600; margin-bottom: 8px;">🛍️ المنتجات:</div>
          ${order.products.map(p => `
            <div class="product-item">
              <span>${p.name}</span>
              <span>${p.price} ج.م</span>
            </div>
          `).join('')}
          <div class="product-item" style="border-top: 1px solid #d4af37; margin-top: 8px; padding-top: 8px; font-weight: 700;">
            <span>الإجمالي</span>
            <span style="color: #d4af37;">${order.total} ج.م</span>
          </div>
        </div>
        
        ${order.rejectReason ? `
          <div style="background: #e74c3c20; padding: 10px; border-radius: 8px; margin: 10px 0;">
            <strong>⚠️ سبب الرفض:</strong> ${order.rejectReason}
          </div>
        ` : ''}
        
        <div class="order-actions">
          ${order.status === 'pending' ? `
            <button class="action-btn approve" onclick="updateOrderStatus('${order.orderId}', 'paid')">
              <i class="fas fa-check"></i> تأكيد الدفع
            </button>
            <button class="action-btn reject" onclick="showRejectModal('${order.orderId}')">
              <i class="fas fa-times"></i> رفض الطلب
            </button>
          ` : ''}
          
          ${order.status === 'paid' ? `
            <button class="action-btn ship" onclick="updateOrderStatus('${order.orderId}', 'shipped')">
              <i class="fas fa-truck"></i> تم الشحن
            </button>
          ` : ''}
          
          ${order.status === 'shipped' ? `
            <button class="action-btn deliver" onclick="updateOrderStatus('${order.orderId}', 'delivered')">
              <i class="fas fa-box"></i> تم التوصيل
            </button>
          ` : ''}
        </div>
      </div>
    `).join('');
  }
  
  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderOrders();
    });
  });
  
  // Make functions global
  window.updateOrderStatus = updateOrderStatus;
  window.showRejectModal = showRejectModal;
  
  // Start loading
  loadOrders();
</script>
</body>
</html>
